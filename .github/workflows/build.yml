name: 打包 Windows 版本

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.8（兼容 Windows 7）
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 打包为单个 exe（Windows x86_64）
      shell: cmd
      run: |
        pyinstaller build_win.spec --noconfirm

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ImageToPDF-Windows
        path: dist/ImageToPDF.exe
